name: Publish to NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (leave blank for date-based YYYY.M.D.run#)"
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for NuGet Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Compute version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="$(date +%Y.%-m.%-d).${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Test
        run: dotnet test WolfCurses.sln -c Release

      - name: Pack
        run: >
          dotnet pack src/WolfCurses.csproj -c Release
          -p:Version=${{ steps.version.outputs.version }}
          -p:ContinuousIntegrationBuild=true
          -o artifacts

      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push
        run: >
          dotnet nuget push artifacts/*.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
